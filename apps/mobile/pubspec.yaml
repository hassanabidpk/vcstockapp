name: vc_stocks_mobile
description: "VC Stocks - Portfolio tracker for US stocks, SG stocks, and crypto."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Data classes
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Charts
  fl_chart: ^0.68.0

  # Firebase AI
  firebase_core: ^3.13.0
  firebase_ai: ^2.3.0

  # Local persistence
  path_provider: ^2.1.5
  shared_preferences: ^2.3.5

  # Utilities
  intl: ^0.19.0
  shimmer: ^3.0.0
  flutter_dotenv: ^5.1.0
  flutter_markdown: ^0.7.7+1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - .env
